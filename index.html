<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B.U.M.</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <main class="monitor">
        <section class="desktop">
            <section id="icons">
                <div class="icon inactive" id="computerIcon">computer</div>
                <div class="icon inactive" id="recycleBinIcon">recycleBin</div>
                <div class="icon inactive" id="filesIcon">files</div>
                <div class="icon inactive" id="umailIcon">umail</div>
                <div class="icon inactive" id="workIcon">work</div>
            </section>

            <section class="window umail hidden">
                <span class="windowBar" id="umailBar">
                    <button class="windowButton btnClose" id="umailClose">X</button>
                    <span class="windowTitle" id="umailTitle">Umail</span>
                </span>
                <section class="windowBody">
                    <aside class="contactsBar">
                        <ul class="contactsList">
                            <li class="contact" id="managerContact">Bobby</li>
                            <li class="contact" id="hackerContact">#%%^*&</li>
                            <li class="contact" id="rogelioContact">Rogelio</li>
                            <li class="contact" id="printerContact">Printer</li>
                        </ul>
                    </aside>
                    <section class="umailChat">
                        <span class="chatTitle">Bobby</span>
                        <article class="umailChatLogs"></article>
                        <ul class="choiceBoxes">
                            <li class="choiceBox" id="mangerChoice">1</li>
                            <li class="choiceBox" id="hackerChoice">2</li>
                            <li class="choiceBox" id="neutralChoice">3</li>
                        </ul>
                    </section>
                </section>
            </section>

        </section>
        <section class="monitorInteractables">
            <section class="monitorDiskDrive"></section>
            <section class="monitorPower">
                <button class="monitorPowerOnBtn"></button>
                <section class="monitorPowerLight on">
                    <div class="monitorPowerInner on"></div>
                </section>
            </section>
        </section>
    </main>
</body>

</html>
